<!DOCTYPE html>
<html>
<head>
    <title>Debug Authentication</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .error { background: #ffe6e6; color: #d63031; }
        .success { background: #e6f7e6; color: #2d6a4f; }
    </style>
</head>
<body>
    <h1>Authentication Debug Tool</h1>
    
    <div class="section">
        <h2>1. Check Current Cookies</h2>
        <button onclick="checkCookies()">Check Cookies</button>
        <div id="cookies-result" class="result"></div>
    </div>

    <div class="section">
        <h2>2. Test API Call</h2>
        <input type="text" id="api-url" placeholder="API URL" value="http://localhost:8000/items" style="width: 300px; padding: 5px;">
        <br><br>
        <button onclick="testApiCall()">Test API Call</button>
        <div id="api-result" class="result"></div>
    </div>

    <div class="section">
        <h2>3. Manual Token Test</h2>
        <input type="text" id="token" placeholder="Bearer token" style="width: 400px; padding: 5px;">
        <br><br>
        <button onclick="testWithToken()">Test with Token</button>
        <div id="token-result" class="result"></div>
    </div>

    <script>
        function checkCookies() {
            const cookies = document.cookie;
            const result = document.getElementById('cookies-result');
            
            if (cookies) {
                result.innerHTML = `<div class="success">Found cookies: ${cookies}</div>`;
            } else {
                result.innerHTML = `<div class="error">No cookies found</div>`;
            }
        }

        async function testApiCall() {
            const apiUrl = document.getElementById('api-url').value;
            const result = document.getElementById('api-result');
            
            try {
                result.innerHTML = 'Making API call...';
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `<div class="success">✅ Success: ${JSON.stringify(data, null, 2)}</div>`;
                } else {
                    result.innerHTML = `<div class="error">❌ Error (${response.status}): ${JSON.stringify(data, null, 2)}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="error">❌ Network Error: ${error.message}</div>`;
            }
        }

        async function testWithToken() {
            const token = document.getElementById('token').value;
            const apiUrl = document.getElementById('api-url').value;
            const result = document.getElementById('token-result');
            
            if (!token) {
                result.innerHTML = `<div class="error">Please enter a token</div>`;
                return;
            }
            
            try {
                result.innerHTML = 'Making API call with token...';
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `<div class="success">✅ Success with token: ${JSON.stringify(data, null, 2)}</div>`;
                } else {
                    result.innerHTML = `<div class="error">❌ Error with token (${response.status}): ${JSON.stringify(data, null, 2)}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="error">❌ Network Error: ${error.message}</div>`;
            }
        }

        // Auto-check cookies on load
        window.onload = function() {
            checkCookies();
        };
    </script>
</body>
</html>
