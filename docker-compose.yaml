name: comkit-dev

services:
  backend:
    image: python:3.12-slim
    container_name: comkit-backend
    working_dir: /app
    env_file:
      - ./server-fastapi/.env
    environment:
      PORT: "8000"
      ENVIRONMENT: development
      DATABASE_URL: sqlite:///./kitchen.db
      OLLAMA_API_URL: ${OLLAMA_API_URL:-http://host.docker.internal:11434}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./server-fastapi:/app
      - backend_pip_cache:/root/.cache/pip
    command: >
      sh -c "pip install --upgrade pip &&
      pip install -r requirements.txt &&
      python main.py"
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped

  frontend:
    image: node:22-bookworm-slim
    container_name: comkit-frontend
    working_dir: /app
    env_file:
      - ./ui/.env
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      CHOKIDAR_USEPOLLING: "true"
      NUXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
    command: >
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "8001:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_pip_cache:
  ui_node_modules: